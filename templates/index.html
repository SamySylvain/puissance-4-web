<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puissance 4 Web</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #2c3e50;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 620px;
      padding: 20px;
      border-radius: 12px;
      background: #34495e;
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 32px;
    }

    .menu button, .controls button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-default { background: #ecf0f1; color: #2c3e50; }
    .btn-secondary { background: #95a5a6; color: #2c3e50; }
    .btn-dark { background: #34495e; color: white; border: 1px solid #7f8c8d !important; }

    #gameView { display: none; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .left-controls, .right-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .left-controls button {
      width: auto;
      margin: 0;
      padding: 8px 14px;
      font-size: 14px;
    }

    .end-actions {
      display: none;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .end-actions button {
      width: auto;
      margin: 0;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    #status {
      font-weight: bold;
      min-width: 170px;
      text-align: center;
    }

    #depthValue { font-weight: bold; }

    #gameCanvas {
      display: block;
      margin: 0 auto;
      background: blue;
      border-radius: 4px;
      cursor: pointer;
    }

    #message {
      text-align: center;
      min-height: 22px;
      margin-top: 8px;
      color: #f1c40f;
      font-weight: bold;
    }

    .below-board-controls {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    /* ---- Mode Édition ---- */
    #editView { display: none; }

    .edit-palette {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .pal-btn {
      padding: 7px 18px;
      border: 3px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    .pal-btn.active  { border-color: white; }
    .pal-erase  { background: #7f8c8d; color: white; }
    .pal-rouge  { background: red;     color: white; }
    .pal-jaune  { background: #f1c40f; color: #2c3e50; }

    .edit-first {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      font-size: 14px;
    }

    .edit-start {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .edit-start button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      background: #ecf0f1;
      color: #2c3e50;
      font-weight: bold;
    }

    #editSavesSection {
      margin-top: 10px;
      border-top: 1px solid #4a6278;
      padding-top: 8px;
    }
    #editSavesSection h4 {
      margin: 0 0 6px 0;
      font-size: 13px;
      color: #bdc3c7;
      text-align: center;
    }
    #editSavesList {
      max-height: 140px;
      overflow-y: auto;
    }
    .esave-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 8px;
      background: #2c3e50;
      border-radius: 4px;
      margin: 3px 0;
      font-size: 13px;
    }
    .esave-item span { color: #ecf0f1; }
    .esave-item .esave-btns { display: flex; gap: 4px; }
    .esave-item button {
      padding: 2px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .esave-load { background: #27ae60; color: white; }
    .esave-del  { background: #c0392b; color: white; }

  </style>
</head>
<body>
  <div class="card">
    <div id="menuView" class="menu">
      <h1>PUISSANCE 4</h1>
      <button class="btn-default" id="btnMode1">Joueur vs Joueur</button>
      <button class="btn-default" id="btnMode4">Joueur vs IA (Aléatoire)</button>
      <button class="btn-default" id="btnMode2">Joueur vs IA (Minimax)</button>
      <button class="btn-default" id="btnMode3">IA vs IA</button>
      <button class="btn-secondary" id="btnLoad">Charger la partie</button>
      <button class="btn-secondary" id="btnEditMode">✏ Mode Édition</button>
    </div>

    <!-- ===== VUE ÉDITION ===== -->
    <div id="editView">
      <div class="toolbar">
        <div class="left-controls controls">
          <button class="btn-secondary" id="btnEditBack">← Menu</button>
          <button class="btn-secondary" id="btnEditClear">Effacer tout</button>
          <button class="btn-default"   id="btnEditSave">💾 Sauvegarder</button>
          <span style="font-size:13px;color:#bdc3c7;">Clic : cycle vide→rouge→jaune</span>
        </div>
      </div>

      <div class="edit-palette">
        <button class="pal-btn pal-erase" id="palErase">Effacer</button>
        <button class="pal-btn pal-rouge active" id="palRouge">● Rouge</button>
        <button class="pal-btn pal-jaune" id="palJaune">● Jaune</button>
      </div>

      <canvas id="editCanvas" width="540" height="570"
              style="display:block;margin:0 auto;background:blue;border-radius:4px;cursor:pointer;"></canvas>

      <div class="edit-first">
        <span>Commence :</span>
        <button class="pal-btn pal-rouge active" id="editFirst1">Rouge</button>
        <button class="pal-btn pal-jaune" id="editFirst2">Jaune</button>
      </div>

      <div class="edit-start">
        <button id="btnEditJvJ">Joueur vs Joueur</button>
        <button id="btnEditJvIA">Joueur vs IA (Minimax)</button>
        <button id="btnEditIAvIA">IA vs IA</button>
      </div>

      <div id="editMessage" style="text-align:center;min-height:20px;margin-top:6px;color:#e74c3c;font-weight:bold;"></div>

      <div id="editSavesSection">
        <h4>Positions sauvegardées</h4>
        <div id="editSavesList"></div>
      </div>
    </div>

    <div id="gameView">
      <div class="toolbar">
        <div class="left-controls controls">
          <button class="btn-default" id="btnUndo" title="Annuler">&#8592;</button>
          <button class="btn-default" id="btnRedo" title="Rejouer">&#8594;</button>
          <button class="btn-default" id="btnSave">SAVE</button>
          <button class="btn-default" id="btnAbandon">ABANDON</button>
          <span id="status"></span>
        </div>

        <div class="right-controls" id="iaControls" style="display:none;">
          <label for="depth">Profondeur IA</label>
          <input type="range" id="depth" min="1" max="9" value="9" />
          <span id="depthValue">3</span>
        </div>
      </div>

      <canvas id="gameCanvas" width="540" height="620"></canvas>

      <div id="iaVsIaDepth" class="below-board-controls">
        <label for="depthMode3">Profondeur IA</label>
        <input type="range" id="depthMode3" min="1" max="9" value="9" />
        <span id="depthMode3Value">3</span>
      </div>

      <div id="message"></div>

      <div id="endActions" class="end-actions">
        <button class="btn-default" id="btnReplay">REJOUER</button>
        <button class="btn-dark" id="btnReturnMenu">RETOUR MENU</button>
      </div>
    </div>
  </div>

  <script>
    const NB_LIGNES = 9;
    const NB_COLONNES = 9;
    const TAILLE_CASE = 60;

    const menuView = document.getElementById('menuView');
    const gameView = document.getElementById('gameView');
    const gameCanvas = document.getElementById('gameCanvas');
    const ctx = gameCanvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const messageEl = document.getElementById('message');
    const endActions = document.getElementById('endActions');
    const iaControls = document.getElementById('iaControls');
    const depthInput = document.getElementById('depth');
    const depthValue = document.getElementById('depthValue');
    const iaVsIaDepth = document.getElementById('iaVsIaDepth');
    const depthMode3Input = document.getElementById('depthMode3');
    const depthMode3Value = document.getElementById('depthMode3Value');

    let state = null;
    let iaTimer = null;
    let aiRequestInFlight = false;
    let playerVsAiTimeout = null;
    const SAVES_KEY = 'puissance4_saves';

    const pionsGagnantsSet = () => new Set((state?.pions_gagnants || []).map(([l, c]) => `${l}-${c}`));

    function setViewGame(isGame) {
      menuView.style.display = isGame ? 'none' : 'block';
      gameView.style.display = isGame ? 'block' : 'none';
      if (!isGame && iaTimer) {
        clearInterval(iaTimer);
        iaTimer = null;
      }
      if (!isGame && playerVsAiTimeout) {
        clearTimeout(playerVsAiTimeout);
        playerVsAiTimeout = null;
      }
      if (!isGame) {
        aiRequestInFlight = false;
      }
    }

    async function returnToMenu(clearServerState = true) {
      if (clearServerState) {
        await api('/api/clear_state', 'POST');
      }
      setViewGame(false);
      state = null;
      statusEl.textContent = '';
      messageEl.textContent = '';
    }

    async function api(url, method = 'GET', body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      return await res.json();
    }

    function getSavedGames() {
      const raw = localStorage.getItem(SAVES_KEY);
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function setSavedGames(saves) {
      localStorage.setItem(SAVES_KEY, JSON.stringify(saves));
    }

    function updateStatus() {
      if (!state) return;
      if (state.jeu_en_cours) {
        const color = state.jeton_actuel === 1 ? 'red' : 'yellow';
        statusEl.style.color = color;
        statusEl.textContent = `Tour du Joueur ${state.jeton_actuel}`;
        endActions.style.display = 'none';
      } else {
        statusEl.style.color = 'white';
        statusEl.textContent = 'PARTIE TERMINÉE';
        endActions.style.display = 'flex';
      }

      iaControls.style.display = 'none';
      iaVsIaDepth.style.display = (state.mode === 2 || state.mode === 3) ? 'flex' : 'none';

      const depth = state.profondeur_ia || 3;
      depthInput.value = depth;
      depthValue.textContent = String(depth);
      depthMode3Input.value = depth;
      depthMode3Value.textContent = String(depth);
    }

    function drawBoard() {
      if (!state) return;
      ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

      // Fond bleu
      ctx.fillStyle = 'blue';
      ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

      // Numéros colonnes
      ctx.fillStyle = 'white';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      for (let c = 0; c < NB_COLONNES; c++) {
        const x = c * TAILLE_CASE + TAILLE_CASE / 2;
        ctx.fillText(String(c + 1), x, 18);
      }

      const gagnants = pionsGagnantsSet();

      // Cases + pions
      for (let l = 0; l < NB_LIGNES; l++) {
        for (let c = 0; c < NB_COLONNES; c++) {
          const x1 = c * TAILLE_CASE;
          const y1 = l * TAILLE_CASE + 30;
          const cx = x1 + TAILLE_CASE / 2;
          const cy = y1 + TAILLE_CASE / 2;
          const val = state.plateau[l][c];

          let color = 'white';
          if (val === 1) color = 'red';
          if (val === 2) color = 'yellow';

          ctx.beginPath();
          ctx.arc(cx, cy, TAILLE_CASE / 2 - 5, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
          ctx.lineWidth = 1;
          ctx.strokeStyle = 'black';
          ctx.stroke();

          if (gagnants.has(`${l}-${c}`) && val !== 0) {
            ctx.beginPath();
            ctx.arc(cx, cy, TAILLE_CASE / 2 - 2, 0, Math.PI * 2);
            ctx.lineWidth = 4;
            ctx.strokeStyle = 'white';
            ctx.stroke();
          }
        }
      }

      // Marqueur dernier coup joué : bord noir épais
      const hist = state.historique;
      if (hist && hist.length > 0) {
        const [lastL, lastC] = hist[hist.length - 1];
        const lx = lastC * TAILLE_CASE + TAILLE_CASE / 2;
        const ly = lastL * TAILLE_CASE + 30 + TAILLE_CASE / 2;
        ctx.beginPath();
        ctx.arc(lx, ly, TAILLE_CASE / 2 - 2, 0, Math.PI * 2);
        ctx.lineWidth = 4;
        ctx.strokeStyle = 'black';
        ctx.stroke();
      }

      // Scores colonnes bas (normalisés 1–10)
      const rawScores = state.scores_colonnes || [];
      const validScores = rawScores.filter(s => s !== null && s !== undefined);
      if (validScores.length > 0) {
        const minS = Math.min(...validScores);
        const maxS = Math.max(...validScores);
        const range = maxS - minS;

        for (let c = 0; c < NB_COLONNES; c++) {
          const score = rawScores[c];
          if (score === null || score === undefined) continue;

          const note = range === 0 ? 5 : Math.round(1 + (score - minS) / range * 9);

          let color = '#f39c12';
          if (note >= 8) color = '#2ecc71';
          else if (note <= 3) color = '#e74c3c';

          const x = c * TAILLE_CASE + TAILLE_CASE / 2;
          const y = NB_LIGNES * TAILLE_CASE + 45;

          ctx.fillStyle = color;
          ctx.font = 'bold 14px Arial';
          ctx.fillText(String(note), x, y);
        }
      }
    }

    function renderAll() {
      updateStatus();
      drawBoard();
      updateNavButtons();
      if (!state?.jeu_en_cours && state?.pions_gagnants?.length) {
        const gagnant = state.jeton_actuel === 1 ? 'ROUGE' : 'JAUNE';
        messageEl.textContent = `Victoire du joueur ${gagnant}`;
      } else {
        messageEl.textContent = '';
      }
    }

    async function startGame(mode) {
      const data = await api('/api/new_game', 'POST', { mode });
      if (!data.ok) {
        alert(data.error || 'Erreur création partie');
        return;
      }
      state = data.state;
      setViewGame(true);
      renderAll();
      setupIaLoop();
    }

    function scheduleMode2AiIfNeeded() {
      if (!state || state.mode !== 2 || !state.jeu_en_cours || state.jeton_actuel !== 2) return;
      if (playerVsAiTimeout) {
        clearTimeout(playerVsAiTimeout);
        playerVsAiTimeout = null;
      }
      playerVsAiTimeout = setTimeout(async () => {
        if (!state || state.mode !== 2 || !state.jeu_en_cours || state.jeton_actuel !== 2) return;
        if (aiRequestInFlight) return;
        aiRequestInFlight = true;
        try {
          const aiData = await api('/api/ai_move', 'POST');
          if (!aiData.ok) {
            messageEl.textContent = aiData.error || "Erreur lors du coup de l'IA";
            return;
          }
          state = aiData.state;
          renderAll();
        } finally {
          aiRequestInFlight = false;
        }
      }, 600);
    }

    async function restoreGameIfAny() {
      const data = await api('/api/state');
      if (!data.ok || !data.state) return;
      state = data.state;
      setViewGame(true);
      renderAll();
      setupIaLoop();
      scheduleMode2AiIfNeeded();
    }

    function setupIaLoop() {
      if (iaTimer) {
        clearInterval(iaTimer);
        iaTimer = null;
      }
      if (state?.mode === 3 || state?.mode === 4) {
        iaTimer = setInterval(async () => {
          if (aiRequestInFlight) return;
          if (!state?.jeu_en_cours) {
            clearInterval(iaTimer);
            iaTimer = null;
            return;
          }
          if (state.mode === 4 && state.jeton_actuel !== 2) {
            return;
          }
          aiRequestInFlight = true;
          try {
            const endpoint = state.mode === 3 ? '/api/ai_step' : '/api/ai_move';
            const data = await api(endpoint, 'POST');
            if (data.ok) {
              state = data.state;
              renderAll();
            }
          } finally {
            aiRequestInFlight = false;
          }
        }, 600);
      }
    }

    gameCanvas.addEventListener('click', async (event) => {
      if (!state || !state.jeu_en_cours) return;
      if (state.mode === 3) return;

      const rect = gameCanvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      if (y > NB_LIGNES * TAILLE_CASE + 30) return;
      if (y < 30) return;

      const col = Math.floor(x / TAILLE_CASE);
      const data = await api('/api/play', 'POST', { col });
      if (!data.ok) {
        messageEl.textContent = data.error || 'Coup invalide';
        return;
      }
      state = data.state;
      renderAll();

      if (state.mode === 2 && state.jeu_en_cours && state.jeton_actuel === 2) {
        scheduleMode2AiIfNeeded();
      }
    });

    document.getElementById('btnMode1').addEventListener('click', () => startGame(1));
    document.getElementById('btnMode4').addEventListener('click', () => startGame(4));
    document.getElementById('btnMode2').addEventListener('click', () => startGame(2));
    document.getElementById('btnMode3').addEventListener('click', () => startGame(3));

    function updateNavButtons() {
      const btnUndo = document.getElementById('btnUndo');
      const btnRedo = document.getElementById('btnRedo');
      if (!state) { btnUndo.disabled = true; btnRedo.disabled = true; return; }
      btnUndo.disabled = !state.historique || state.historique.length === 0;
      btnRedo.disabled = !state.historique_futur || state.historique_futur.length === 0;
    }

    document.getElementById('btnUndo').addEventListener('click', async () => {
      if (!state) return;
      if (playerVsAiTimeout) {
        clearTimeout(playerVsAiTimeout);
        playerVsAiTimeout = null;
      }
      const data = await api('/api/undo', 'POST');
      if (!data.ok) {
        messageEl.textContent = data.error || 'Undo impossible';
        return;
      }
      state = data.state;
      renderAll();
      updateNavButtons();
    });

    document.getElementById('btnRedo').addEventListener('click', async () => {
      if (!state) return;
      if (playerVsAiTimeout) {
        clearTimeout(playerVsAiTimeout);
        playerVsAiTimeout = null;
      }
      const data = await api('/api/redo', 'POST');
      if (!data.ok) {
        messageEl.textContent = data.error || 'Redo impossible';
        return;
      }
      state = data.state;
      renderAll();
      updateNavButtons();
      if (state.mode === 2 && state.jeu_en_cours && state.jeton_actuel === 2) {
        scheduleMode2AiIfNeeded();
      }
    });

    document.getElementById('btnSave').addEventListener('click', async () => {
      if (!state) return;

      // Sauvegarde locale (localStorage) comme avant
      const saves = getSavedGames();
      const savedAt = Date.now();
      const snapshot = JSON.parse(JSON.stringify(state));
      saves.push({
        id: `${savedAt}-${Math.floor(Math.random() * 100000)}`,
        name: `Partie ${saves.length + 1}`,
        savedAt,
        mode: state.mode,
        state: snapshot,
      });
      setSavedGames(saves);

      // Mise à jour du statut SAVE en base de données
      const data = await api('/api/save', 'POST');
      if (!data.ok) {
        messageEl.textContent = data.error || 'Erreur lors de la sauvegarde.';
        return;
      }

      // Retour au menu
      await returnToMenu(true);
      messageEl.textContent = 'Partie sauvegardée.';
    });

    document.getElementById('btnAbandon').addEventListener('click', async () => {
      if (!state) return;
      const confirmed = window.confirm('Voulez-vous vraiment abandonner la partie ?');
      if (!confirmed) return;
      const data = await api('/api/abandon', 'POST');
      if (!data.ok) {
        messageEl.textContent = data.error || 'Abandon impossible';
        return;
      }
      state = data.state;
      renderAll();
      await returnToMenu(true);
      messageEl.textContent = data.message || 'Partie abandonnée.';
    });

    document.getElementById('btnLoad').addEventListener('click', async () => {
      window.location.href = '/saves';
    });

    document.getElementById('btnReplay').addEventListener('click', async () => {
      if (!state) return;
      await startGame(state.mode);
    });

    document.getElementById('btnReturnMenu').addEventListener('click', () => {
      returnToMenu(true);
    });

    async function setDepthValue(value) {
      if (!state) return;
      const data = await api('/api/set_depth', 'POST', { depth: Number(value) });
      if (data.ok) {
        state = data.state;
        renderAll();
      }
    }

    depthInput.addEventListener('input', async () => {
      depthValue.textContent = depthInput.value;
      depthMode3Value.textContent = depthInput.value;
      depthMode3Input.value = depthInput.value;
      await setDepthValue(depthInput.value);
    });

    depthMode3Input.addEventListener('input', async () => {
      depthMode3Value.textContent = depthMode3Input.value;
      depthValue.textContent = depthMode3Input.value;
      depthInput.value = depthMode3Input.value;
      await setDepthValue(depthMode3Input.value);
    });

    restoreGameIfAny();

    // =====================================================================
    // MODE ÉDITION
    // =====================================================================

    const editView    = document.getElementById('editView');
    const editCanvas  = document.getElementById('editCanvas');
    const editCtx     = editCanvas.getContext('2d');
    const editMessage = document.getElementById('editMessage');

    const EDIT_OFFSET_Y = 20;   // hauteur réservée aux numéros de colonnes

    let editBoard      = null;
    let editColor      = 1;     // 0=effacer 1=rouge 2=jaune
    let editFirstJeton = 1;

    // --- Navigation vers la vue édition ---
    function setViewEdit(on) {
      menuView.style.display = on ? 'none'  : 'block';
      editView.style.display = on ? 'block' : 'none';
      gameView.style.display = 'none';
    }

    function openEditMode() {
      editBoard      = Array.from({length: NB_LIGNES}, () => Array(NB_COLONNES).fill(0));
      editColor      = 1;
      editFirstJeton = 1;
      editMessage.textContent = '';
      refreshEditPalette();
      refreshEditFirst();
      setViewEdit(true);
      drawEditBoard();
      renderEditorSaves();
    }

    // --- Dessin du plateau édition ---
    function drawEditBoard() {
      editCtx.clearRect(0, 0, editCanvas.width, editCanvas.height);
      editCtx.fillStyle = 'blue';
      editCtx.fillRect(0, 0, editCanvas.width, editCanvas.height);

      editCtx.fillStyle = 'white';
      editCtx.font = 'bold 14px Arial';
      editCtx.textAlign = 'center';
      for (let c = 0; c < NB_COLONNES; c++) {
        editCtx.fillText(String(c + 1), c * TAILLE_CASE + TAILLE_CASE / 2, 15);
      }

      for (let l = 0; l < NB_LIGNES; l++) {
        for (let c = 0; c < NB_COLONNES; c++) {
          const cx = c * TAILLE_CASE + TAILLE_CASE / 2;
          const cy = l * TAILLE_CASE + EDIT_OFFSET_Y + TAILLE_CASE / 2;
          const val = editBoard[l][c];

          editCtx.beginPath();
          editCtx.arc(cx, cy, TAILLE_CASE / 2 - 5, 0, Math.PI * 2);
          editCtx.fillStyle = val === 1 ? 'red' : val === 2 ? 'yellow' : 'white';
          editCtx.fill();
          editCtx.lineWidth = 1;
          editCtx.strokeStyle = 'black';
          editCtx.stroke();
        }
      }
    }

    // --- Palette couleur ---
    function refreshEditPalette() {
      document.getElementById('palErase').classList.toggle('active', editColor === 0);
      document.getElementById('palRouge').classList.toggle('active', editColor === 1);
      document.getElementById('palJaune').classList.toggle('active', editColor === 2);
    }

    function refreshEditFirst() {
      document.getElementById('editFirst1').classList.toggle('active', editFirstJeton === 1);
      document.getElementById('editFirst2').classList.toggle('active', editFirstJeton === 2);
    }

    document.getElementById('palErase').addEventListener('click', () => { editColor = 0; refreshEditPalette(); });
    document.getElementById('palRouge').addEventListener('click', () => { editColor = 1; refreshEditPalette(); });
    document.getElementById('palJaune').addEventListener('click', () => { editColor = 2; refreshEditPalette(); });
    document.getElementById('editFirst1').addEventListener('click', () => { editFirstJeton = 1; refreshEditFirst(); });
    document.getElementById('editFirst2').addEventListener('click', () => { editFirstJeton = 2; refreshEditFirst(); });

    // --- Clic sur le canvas édition ---
    editCanvas.addEventListener('click', (e) => {
      if (!editBoard) return;
      const rect = editCanvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top - EDIT_OFFSET_Y;
      const c = Math.floor(x / TAILLE_CASE);
      const l = Math.floor(y / TAILLE_CASE);
      if (c < 0 || c >= NB_COLONNES || l < 0 || l >= NB_LIGNES) return;

      // Clic gauche : cycle vide→rouge→jaune→vide
      // Clic avec palette sélectionnée : place la couleur choisie, ou efface si même couleur
      const cur = editBoard[l][c];
      if (editColor === 0) {
        editBoard[l][c] = 0;
      } else {
        editBoard[l][c] = cur === editColor ? 0 : editColor;
      }
      editMessage.textContent = '';
      drawEditBoard();
    });

    // --- Boutons ---
    document.getElementById('btnEditBack').addEventListener('click', () => {
      setViewEdit(false);
    });

    document.getElementById('btnEditClear').addEventListener('click', () => {
      editBoard = Array.from({length: NB_LIGNES}, () => Array(NB_COLONNES).fill(0));
      editMessage.textContent = '';
      drawEditBoard();
    });

    async function lancerDepuisEdition(mode) {
      editMessage.textContent = '';
      const data = await api('/api/start_from_position', 'POST', {
        plateau: editBoard,
        mode,
        jeton_actuel: editFirstJeton,
      });
      if (!data.ok) {
        editMessage.textContent = data.error || 'Position invalide';
        return;
      }
      state = data.state;
      setViewEdit(false);
      setViewGame(true);
      renderAll();
      setupIaLoop();
      if (mode === 2 && state.jeu_en_cours && state.jeton_actuel === 2) {
        scheduleMode2AiIfNeeded();
      }
    }

    document.getElementById('btnEditJvJ').addEventListener('click',   () => lancerDepuisEdition(1));
    document.getElementById('btnEditJvIA').addEventListener('click',  () => lancerDepuisEdition(2));
    document.getElementById('btnEditIAvIA').addEventListener('click', () => lancerDepuisEdition(3));
    document.getElementById('btnEditMode').addEventListener('click',  openEditMode);

    // ---- Sauvegarde des positions éditeur (localStorage séparé) ----

    const EDITOR_SAVES_KEY = 'puissance4_editor_saves';

    function getEditorSaves() {
      try { return JSON.parse(localStorage.getItem(EDITOR_SAVES_KEY)) || []; }
      catch { return []; }
    }
    function setEditorSaves(saves) {
      localStorage.setItem(EDITOR_SAVES_KEY, JSON.stringify(saves));
    }

    function renderEditorSaves() {
      const saves = getEditorSaves();
      const el = document.getElementById('editSavesList');
      if (saves.length === 0) {
        el.innerHTML = '<div style="color:#7f8c8d;font-size:13px;text-align:center;padding:4px;">Aucune position sauvegardée</div>';
        return;
      }
      el.innerHTML = saves.map((s, idx) => `
        <div class="esave-item">
          <span>${s.name}</span>
          <div class="esave-btns">
            <button class="esave-load" onclick="chargerEditorSave('${s.id}')">Charger</button>
            <button class="esave-del"  onclick="supprimerEditorSave('${s.id}')">✕</button>
          </div>
        </div>
      `).join('');
    }

    window.chargerEditorSave = function(id) {
      const save = getEditorSaves().find(s => s.id === id);
      if (!save) return;
      editBoard = JSON.parse(JSON.stringify(save.board));
      editFirstJeton = save.firstJeton || 1;
      refreshEditFirst();
      editMessage.textContent = '';
      drawEditBoard();
    };

    window.supprimerEditorSave = function(id) {
      setEditorSaves(getEditorSaves().filter(s => s.id !== id));
      renderEditorSaves();
    };

    document.getElementById('btnEditSave').addEventListener('click', () => {
      const saves = getEditorSaves();
      const id = `${Date.now()}-${Math.floor(Math.random() * 10000)}`;
      saves.push({
        id,
        name: `Position ${saves.length + 1}`,
        savedAt: Date.now(),
        board: JSON.parse(JSON.stringify(editBoard)),
        firstJeton: editFirstJeton,
      });
      setEditorSaves(saves);
      renderEditorSaves();
      editMessage.style.color = '#2ecc71';
      editMessage.textContent = 'Position sauvegardée !';
      setTimeout(() => { editMessage.textContent = ''; editMessage.style.color = '#e74c3c'; }, 1500);
    });

  </script>
</body>
</html>
