<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puissance 4 Web</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #2c3e50;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 12px;
    }

    h1 {
      text-align: left;
      margin: 0 0 10px 0;
      font-size: 18px;
      letter-spacing: 3px;
      white-space: nowrap;
    }

    /* ═══════════════════════════════════
       LAYOUT PRINCIPAL (3 colonnes)
    ═══════════════════════════════════ */
    .game-layout {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    /* ─── Panneau gauche ─── */
    .left-panel {
      width: 148px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 44px;
    }

    .left-panel button {
      width: 100%;
      padding: 11px 8px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      cursor: pointer;
      background: #4a6278;
      color: white;
      font-weight: bold;
      transition: background .15s;
    }
    .left-panel button:hover { background: #5a7390; }

    /* ─── Zone plateau ─── */
    .board-area {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .board-toolbar {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 7px;
      width: 432px;
      flex-wrap: wrap;
    }

    .board-toolbar button {
      padding: 7px 11px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      background: #ecf0f1;
      color: #2c3e50;
      font-weight: bold;
      transition: opacity .15s;
    }
    .board-toolbar button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .board-toolbar button.btn-danger {
      background: #c0392b;
      color: white;
    }
    .board-toolbar button.btn-danger:not(:disabled):hover {
      background: #e74c3c;
    }

    #status {
      flex: 1;
      text-align: center;
      font-weight: bold;
      font-size: 14px;
      min-width: 100px;
    }

    #gameCanvas {
      display: block;
      background: blue;
      border-radius: 4px;
      cursor: pointer;
    }

    #message {
      text-align: center;
      min-height: 22px;
      margin-top: 7px;
      font-weight: bold;
      font-size: 15px;
    }

    .end-actions {
      display: none;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }
    .end-actions button {
      padding: 9px 18px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
    }

    /* ─── Panneau droit ─── */
    .right-panel {
      width: 196px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .r-section {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .r-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #95a5a6;
      font-weight: bold;
      margin: 0;
    }

    /* Boutons de mode */
    .mode-btn {
      width: 100%;
      padding: 8px 10px;
      border: 2px solid transparent;
      border-radius: 7px;
      font-size: 12.5px;
      cursor: pointer;
      background: #3d5166;
      color: #ecf0f1;
      text-align: left;
      transition: background .15s;
      font-weight: bold;
    }
    .mode-btn:hover { background: #4a6278; }
    .mode-btn.active {
      background: #1e8449;
      border-color: #27ae60;
      color: white;
    }

    /* Boutons toggle (qui commence / je joue) */
    .toggle-group {
      display: flex;
      gap: 5px;
    }
    .toggle-btn {
      flex: 1;
      padding: 7px 4px;
      border: 2px solid transparent;
      border-radius: 7px;
      font-size: 12.5px;
      cursor: pointer;
      background: #3d5166;
      color: #ecf0f1;
      font-weight: bold;
      transition: background .15s;
    }
    .toggle-btn:hover:not(:disabled) { background: #4a6278; }
    .toggle-btn:disabled { opacity: 0.4; cursor: default; }
    .toggle-btn.sel-rouge {
      background: #922b21;
      border-color: #e74c3c;
      color: white;
    }
    .toggle-btn.sel-jaune {
      background: #b7770d;
      border-color: #f39c12;
      color: white;
    }

    /* Profondeur */
    .depth-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .depth-row input[type=range] {
      flex: 1;
      accent-color: #27ae60;
    }
    #depthValue {
      font-weight: bold;
      min-width: 16px;
      text-align: right;
    }
    .depth-section-wrap { transition: opacity .2s; }
    .depth-section-wrap.dimmed { opacity: 0.4; pointer-events: none; }

    /* Bouton nouvelle partie */
    .btn-new-game {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 7px;
      font-size: 13.5px;
      cursor: pointer;
      background: #2471a3;
      color: white;
      font-weight: bold;
      margin-top: 2px;
      transition: background .15s;
    }
    .btn-new-game:hover { background: #2e86c1; }

    /* ═══════════════════════════════════
       VUE ÉDITION
    ═══════════════════════════════════ */
    #editView { display: none; }

    .edit-layout {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .edit-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 148px;
      padding-top: 8px;
    }
    .edit-left button {
      width: 100%;
      padding: 9px 8px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      cursor: pointer;
      font-weight: bold;
      transition: background .15s;
    }

    .edit-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .edit-palette {
      display: flex;
      justify-content: center;
      gap: 8px;
      position: relative;
      z-index: 10;
    }
    .pal-btn {
      padding: 7px 16px;
      border: 3px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }
    .pal-btn.active { border-color: white; }
    .pal-erase { background: #7f8c8d; color: white; }
    .pal-rouge { background: #c0392b; color: white; }
    .pal-jaune { background: #d4ac0d; color: #2c3e50; }
    .pal-toggle { background: linear-gradient(90deg, #c0392b 50%, #d4ac0d 50%); color: white; padding: 7px 10px; }

    .edit-right {
      width: 196px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .edit-first {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .edit-start {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
    }
    .edit-start button {
      width: 100%;
      padding: 9px 10px;
      border: none;
      border-radius: 7px;
      font-size: 12.5px;
      cursor: pointer;
      background: #2471a3;
      color: white;
      font-weight: bold;
      transition: background .15s;
      text-align: left;
    }
    .edit-start button:hover { background: #2e86c1; }
    .edit-start .edit-mode-btn {
      background: #34495e;
      text-align: left;
    }
    .edit-start .edit-mode-btn.active {
      background: #1a6fa8;
      outline: 2px solid #5dade2;
    }
    .edit-start .edit-mode-btn:hover:not(.active) { background: #4a6278; }
    #btnEditStart {
      width: 100%;
      padding: 10px;
      margin-top: 4px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      background: #27ae60;
      color: white;
      transition: background .15s;
    }
    #btnEditStart:hover { background: #2ecc71; }

    #editMessage {
      text-align: center;
      min-height: 20px;
      margin-top: 4px;
      color: #e74c3c;
      font-weight: bold;
      font-size: 13px;
      width: 432px;
    }

    #editSavesSection {
      margin-top: 6px;
      border-top: 1px solid #4a6278;
      padding-top: 8px;
      width: 432px;
    }
    #editSavesSection h4 {
      margin: 0 0 6px 0;
      font-size: 12px;
      color: #bdc3c7;
      text-align: center;
    }
    #editSavesList { max-height: 130px; overflow-y: auto; }
    .esave-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 8px;
      background: #2c3e50;
      border-radius: 4px;
      margin: 3px 0;
      font-size: 12px;
    }
    .esave-item span { color: #ecf0f1; }
    .esave-item .esave-btns { display: flex; gap: 4px; }
    .esave-item button {
      padding: 2px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }
    .esave-load { background: #27ae60; color: white; }
    .esave-del  { background: #c0392b; color: white; }

    /* ═══════════════════════════════════
       NOTE MODE CHANGE
    ═══════════════════════════════════ */
    #modeChangeNote {
      font-size: 11px;
      color: #f39c12;
      text-align: center;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <!-- ══════════════════════════════════════════
       VUE PRINCIPALE (3 colonnes)
  ══════════════════════════════════════════ -->
  <div id="mainView">
    <div class="game-layout">

      <!-- ── Panneau gauche ── -->
      <div class="left-panel">
        <h1>PUISSANCE 4</h1>
        <button id="btnLoad">📂 Charger partie</button>
        <button id="btnEditMode">✏ &nbsp;Mode Édition</button>
        <button id="btnBDD" onclick="window.location.href='/bdd'" style="background:#34495e;color:white;">🗄 Base de données</button>
      </div>

      <!-- ── Plateau ── -->
      <div class="board-area">
        <div class="board-toolbar">
          <button id="btnUndo" title="Annuler" disabled>&#8592;</button>
          <button id="btnRedo" title="Refaire" disabled>&#8594;</button>
          <button id="btnSave" disabled>💾 SAVE</button>
          <button id="btnAbandon" class="btn-danger" disabled>ABANDON</button>
          <button id="btnPause" style="display:none;">⏸ Pause</button>
          <span id="status">Démarrez une nouvelle partie →</span>
        </div>

        <canvas id="gameCanvas" width="432" height="512"></canvas>

        <div id="message"></div>

      </div>

      <!-- ── Panneau droit ── -->
      <div class="right-panel">

        <!-- Mode de jeu -->
        <div class="r-section">
          <p class="r-label">Mode de jeu</p>
          <button class="mode-btn active" data-mode="1">👥 Joueur vs Joueur</button>
          <button class="mode-btn" data-mode="4">🎲 Joueur vs IA (Aléatoire)</button>
          <button class="mode-btn" data-mode="2">🤖 Joueur vs IA (Minimax)</button>
          <button class="mode-btn" data-mode="3">⚡ IA vs IA</button>
          <div id="modeChangeNote"></div>
        </div>

        <!-- Qui commence -->
        <div class="r-section" id="commenceSection">
          <p class="r-label">Qui commence</p>
          <div class="toggle-group">
            <button class="toggle-btn sel-rouge" data-commence="1">● Rouge</button>
            <button class="toggle-btn" data-commence="2">● Jaune</button>
          </div>
        </div>

        <!-- Je joue (uniquement JvIA) -->
        <div class="r-section" id="jeJoueSection" style="display:none;">
          <p class="r-label">Je joue</p>
          <div class="toggle-group">
            <button class="toggle-btn sel-rouge" data-human="1">● Rouge</button>
            <button class="toggle-btn" data-human="2">● Jaune</button>
          </div>
        </div>

        <!-- Profondeur IA -->
        <div class="r-section depth-section-wrap" id="depthSection">
          <p class="r-label">Profondeur IA</p>
          <div class="depth-row">
            <input type="range" id="depthInput" min="1" max="9" value="9" />
            <span id="depthValue">9</span>
          </div>
        </div>

        <!-- Nouvelle partie -->
        <button class="btn-new-game" id="btnNewGame">▶ Nouvelle partie</button>

      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       VUE ÉDITION
  ══════════════════════════════════════════ -->
  <div id="editView">
    <div class="edit-layout">

      <!-- Gauche éditeur -->
      <div class="edit-left">
        <button id="btnEditBack" style="background:#95a5a6;color:#2c3e50;">← Retour</button>
        <button id="btnEditClear" style="background:#c0392b;color:white;">🗑 Effacer tout</button>
        <button id="btnEditSave" style="background:#27ae60;color:white;">💾 Sauvegarder</button>
      </div>

      <!-- Canvas éditeur -->
      <div class="edit-center">
        <div class="edit-palette">
          <button class="pal-btn pal-erase" id="palErase">Effacer</button>
          <button class="pal-btn pal-rouge active" id="palRouge">● Rouge</button>
          <button class="pal-btn pal-jaune" id="palJaune">● Jaune</button>
          <button class="pal-btn pal-toggle" id="palToggle">Alterne</button>
        </div>
        <canvas id="editCanvas" width="432" height="462"
                style="display:block;background:blue;border-radius:4px;cursor:pointer;"></canvas>
        <div id="editMessage"></div>
        <div id="editSavesSection">
          <h4>Positions sauvegardées</h4>
          <div id="editSavesList"></div>
        </div>
      </div>

      <!-- Droite éditeur -->
      <div class="edit-right">

        <div class="edit-start">
          <p class="r-label" style="margin-bottom:2px;">Mode de jeu</p>
          <button class="edit-mode-btn active" data-edit-mode="1">👥 Joueur vs Joueur</button>
          <button class="edit-mode-btn" data-edit-mode="4">🎲 Joueur vs IA (Aléatoire)</button>
          <button class="edit-mode-btn" data-edit-mode="2">🤖 Joueur vs IA (Minimax)</button>
          <button class="edit-mode-btn" data-edit-mode="3">⚡ IA vs IA</button>
        </div>

        <div class="r-section edit-first" style="margin-top:8px;">
          <p class="r-label">Commence</p>
          <div class="toggle-group">
            <button class="toggle-btn sel-rouge" id="editFirst1">● Rouge</button>
            <button class="toggle-btn" id="editFirst2">● Jaune</button>
          </div>
        </div>

        <div class="r-section" id="editJeJoueSection" style="display:none; margin-top:8px;">
          <p class="r-label">Je joue</p>
          <div class="toggle-group">
            <button class="toggle-btn sel-rouge" id="editHuman1">● Rouge</button>
            <button class="toggle-btn" id="editHuman2">● Jaune</button>
          </div>
        </div>

        <button id="btnEditStart">▶ Commencer partie</button>

      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════
    //  CONSTANTES
    // ═══════════════════════════════════════════════════
    const NB_LIGNES   = 9;
    const NB_COLONNES = 9;
    const TAILLE_CASE = 48;

    // ═══════════════════════════════════════════════════
    //  RÉFÉRENCES DOM
    // ═══════════════════════════════════════════════════
    const mainView    = document.getElementById('mainView');
    const editView    = document.getElementById('editView');
    const gameCanvas  = document.getElementById('gameCanvas');
    const ctx         = gameCanvas.getContext('2d');
    const statusEl    = document.getElementById('status');
    const messageEl   = document.getElementById('message');
    const depthInput  = document.getElementById('depthInput');
    const depthValue  = document.getElementById('depthValue');
    const modeChangeNote = document.getElementById('modeChangeNote');

    // ═══════════════════════════════════════════════════
    //  ÉTAT
    // ═══════════════════════════════════════════════════
    let state              = null;
    let iaTimer            = null;
    let aiRequestInFlight  = false;
    let playerVsAiTimeout  = null;
    let iaPaused           = false;
    let aiGeneration       = 0;  // incrémenté à chaque stopAllAi pour invalider les réponses en retard
    const SAVES_KEY = 'puissance4_saves';

    // Paramètres UI (avant/indépendants de la partie)
    let selMode     = 1;   // mode sélectionné dans le panneau
    let selCommence = 1;   // 1=rouge, 2=jaune
    let selHuman    = 1;   // 1=rouge, 2=jaune  (JvIA uniquement)
    let selDepth    = 9;

    // ═══════════════════════════════════════════════════
    //  GAME ID  (isolé par onglet via sessionStorage)
    // ═══════════════════════════════════════════════════
    let gameId = sessionStorage.getItem('game_id') || null;

    function saveGameId(gid) {
      gameId = gid;
      if (gid) sessionStorage.setItem('game_id', gid);
      else sessionStorage.removeItem('game_id');
    }

    // ═══════════════════════════════════════════════════
    //  API HELPER
    // ═══════════════════════════════════════════════════
    async function api(url, method = 'GET', body = null) {
      // Injecter le gid automatiquement
      if (method === 'GET') {
        const sep = url.includes('?') ? '&' : '?';
        if (gameId) url = url + sep + 'gid=' + encodeURIComponent(gameId);
      } else {
        body = body || {};
        if (gameId) body.gid = gameId;
      }
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (method !== 'GET') opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      return await res.json();
    }

    // ═══════════════════════════════════════════════════
    //  SAUVEGARDES LOCALES
    // ═══════════════════════════════════════════════════
    function getSavedGames() {
      const raw = localStorage.getItem(SAVES_KEY);
      if (!raw) return [];
      try { const p = JSON.parse(raw); return Array.isArray(p) ? p : []; }
      catch { return []; }
    }
    function setSavedGames(saves) {
      localStorage.setItem(SAVES_KEY, JSON.stringify(saves));
    }

    // ═══════════════════════════════════════════════════
    //  VUES
    // ═══════════════════════════════════════════════════
    function showMainView() {
      mainView.style.display = 'block';
      editView.style.display = 'none';
    }
    function showEditView() {
      mainView.style.display = 'none';
      editView.style.display = 'block';
    }

    // ═══════════════════════════════════════════════════
    //  PANNEAU DROIT — mise à jour UI
    // ═══════════════════════════════════════════════════
    function syncRightPanel() {
      const gameActive = state && state.jeu_en_cours;
      const curMode    = gameActive ? state.mode : selMode;

      // --- Boutons de mode ---
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.mode) === curMode);
      });

      // --- Section "Je joue" (visible seulement en JvIA) ---
      const isVsIA = (curMode === 2 || curMode === 4);
      document.getElementById('jeJoueSection').style.display = isVsIA ? 'flex' : 'none';

      // --- Profondeur (dimmed pour JvJ et JvIA aléatoire) ---
      const depthUseful = (curMode === 2 || curMode === 3);
      document.getElementById('depthSection').classList.toggle('dimmed', !depthUseful || gameActive);
      depthInput.disabled = !depthUseful || gameActive;

      // --- Désactiver commence + jeJoue pendant la partie ---
      const lockNewGameOpts = !!gameActive;
      document.querySelectorAll('[data-commence]').forEach(b => { b.disabled = lockNewGameOpts; });
      document.querySelectorAll('[data-human]').forEach(b => { b.disabled = lockNewGameOpts; });

      // --- Mettre à jour profondeur depuis l'état en cours ---
      if (state) {
        const d = state.profondeur_ia || 9;
        depthInput.value = d;
        depthValue.textContent = d;
        selDepth = d;
      } else {
        depthInput.value = selDepth;
        depthValue.textContent = selDepth;
      }

      // --- Mise à jour des selHuman/selCommence depuis l'état restauré ---
      if (gameActive) {
        selMode  = state.mode;
        selHuman = state.human_jeton || 1;
        refreshCommenceButtons();
        refreshHumanButtons();
      }
    }

    function refreshCommenceButtons() {
      document.querySelectorAll('[data-commence]').forEach(btn => {
        const val = parseInt(btn.dataset.commence);
        btn.classList.remove('sel-rouge', 'sel-jaune');
        if (val === selCommence) btn.classList.add(val === 1 ? 'sel-rouge' : 'sel-jaune');
      });
    }

    function refreshHumanButtons() {
      document.querySelectorAll('[data-human]').forEach(btn => {
        const val = parseInt(btn.dataset.human);
        btn.classList.remove('sel-rouge', 'sel-jaune');
        if (val === selHuman) btn.classList.add(val === 1 ? 'sel-rouge' : 'sel-jaune');
      });
    }

    function refreshModeButtons() {
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.mode) === selMode);
      });
    }

    // ═══════════════════════════════════════════════════
    //  DESSIN DU PLATEAU
    // ═══════════════════════════════════════════════════
    const pionsGagnantsSet = () =>
      new Set((state?.pions_gagnants || []).map(([l, c]) => `${l}-${c}`));

    function drawBoard() {
      ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
      ctx.fillStyle = 'blue';
      ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

      // Numéros colonnes
      ctx.fillStyle = 'white';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      for (let c = 0; c < NB_COLONNES; c++) {
        ctx.fillText(String(c + 1), c * TAILLE_CASE + TAILLE_CASE / 2, 18);
      }

      const plateau = state ? state.plateau : null;
      const gagnants = pionsGagnantsSet();

      for (let l = 0; l < NB_LIGNES; l++) {
        for (let c = 0; c < NB_COLONNES; c++) {
          const x1 = c * TAILLE_CASE;
          const y1 = l * TAILLE_CASE + 30;
          const cx = x1 + TAILLE_CASE / 2;
          const cy = y1 + TAILLE_CASE / 2;
          const val = plateau ? plateau[l][c] : 0;

          let color = 'white';
          if (val === 1) color = 'red';
          if (val === 2) color = 'yellow';

          ctx.beginPath();
          ctx.arc(cx, cy, TAILLE_CASE / 2 - 5, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
          ctx.lineWidth = 1;
          ctx.strokeStyle = 'black';
          ctx.stroke();

          if (gagnants.has(`${l}-${c}`) && val !== 0) {
            ctx.beginPath();
            ctx.arc(cx, cy, TAILLE_CASE / 2 - 2, 0, Math.PI * 2);
            ctx.lineWidth = 4;
            ctx.strokeStyle = 'white';
            ctx.stroke();
          }
        }
      }

      // Marqueur dernier coup
      if (state) {
        const hist = state.historique;
        if (hist && hist.length > 0) {
          const [lastL, lastC] = hist[hist.length - 1];
          const lx = lastC * TAILLE_CASE + TAILLE_CASE / 2;
          const ly = lastL * TAILLE_CASE + 30 + TAILLE_CASE / 2;
          ctx.beginPath();
          ctx.arc(lx, ly, TAILLE_CASE / 2 - 2, 0, Math.PI * 2);
          ctx.lineWidth = 4;
          ctx.strokeStyle = 'black';
          ctx.stroke();
        }

        // Scores colonnes (normalisés 1-10)
        const rawScores = state.scores_colonnes || [];
        const validScores = rawScores.filter(s => s !== null && s !== undefined);
        if (validScores.length > 0) {
          const minS = Math.min(...validScores);
          const maxS = Math.max(...validScores);
          const range = maxS - minS;
          for (let c = 0; c < NB_COLONNES; c++) {
            const score = rawScores[c];
            if (score === null || score === undefined) continue;
            const note = range === 0 ? 5 : Math.round(1 + (score - minS) / range * 9);
            let color = '#f39c12';
            if (note >= 8) color = '#2ecc71';
            else if (note <= 3) color = '#e74c3c';
            const x = c * TAILLE_CASE + TAILLE_CASE / 2;
            const y = NB_LIGNES * TAILLE_CASE + 45;
            ctx.fillStyle = color;
            ctx.font = 'bold 14px Arial';
            ctx.fillText(String(note), x, y);
          }
        }
      }
    }

    // ═══════════════════════════════════════════════════
    //  STATUT & BOUTONS NAV
    // ═══════════════════════════════════════════════════
    function colorName(jeton) { return jeton === 1 ? 'ROUGE' : 'JAUNE'; }

    function updateStatus() {
      const btnUndo   = document.getElementById('btnUndo');
      const btnRedo   = document.getElementById('btnRedo');
      const btnSave   = document.getElementById('btnSave');
      const btnAbandon= document.getElementById('btnAbandon');

      if (!state) {
        statusEl.style.color = 'white';
        statusEl.textContent = 'Démarrez une nouvelle partie →';
        btnUndo.disabled = btnRedo.disabled = btnSave.disabled = btnAbandon.disabled = true;
        return;
      }

      const lockArrows = navInFlight ||
                         (state.jeu_en_cours && state.mode === 3 && !iaPaused) ||
                         (state.jeu_en_cours && state.mode === 2 && aiRequestInFlight);
      btnUndo.disabled = lockArrows || !state.historique || state.historique.length === 0;
      btnRedo.disabled = lockArrows || !state.historique_futur || state.historique_futur.length === 0;
      btnSave.disabled   = false;
      btnAbandon.disabled= !state.jeu_en_cours;

      if (state.jeu_en_cours) {
        statusEl.style.color = state.jeton_actuel === 1 ? '#e74c3c' : '#f1c40f';
        const humanJeton = state.human_jeton || 1;
        const isHumanTurn = (state.mode === 1) ||
                            (state.mode === 3 ? false :
                             state.jeton_actuel === humanJeton);
        const who = (state.mode === 1) ? `Tour ${colorName(state.jeton_actuel)}`
                  : (state.mode === 3) ? `IA réfléchit… (${colorName(state.jeton_actuel)})`
                  : isHumanTurn ? `Votre tour (${colorName(state.jeton_actuel)})`
                  : `IA réfléchit… (${colorName(state.jeton_actuel)})`;
        statusEl.textContent = who;
      } else {
        statusEl.style.color = 'white';
        statusEl.textContent = 'PARTIE TERMINÉE';
      }
    }


    function renderAll() {
      updateStatus();
      drawBoard();
      syncRightPanel();

      updatePauseBtn();

      if (!state?.jeu_en_cours && state?.pions_gagnants?.length) {
        const gagnant = colorName(state.jeton_actuel);
        messageEl.textContent = `Victoire ${gagnant} !`;
        messageEl.style.color = state.jeton_actuel === 1 ? '#e74c3c' : '#f1c40f';
      } else {
        messageEl.textContent = '';
        messageEl.style.color = '';
      }
    }

    // ═══════════════════════════════════════════════════
    //  IA — TOUR ET BOUCLE
    // ═══════════════════════════════════════════════════
    function isAiTurn() {
      if (!state || !state.jeu_en_cours) return false;
      if (state.mode === 3) return true;
      if (state.mode === 2 || state.mode === 4) {
        return state.jeton_actuel !== (state.human_jeton || 1);
      }
      return false;
    }

    function scheduleAiIfNeeded() {
      if (!state || !state.jeu_en_cours) return;
      if ((state.mode === 2 || state.mode === 4) && isAiTurn()) {
        if (playerVsAiTimeout) { clearTimeout(playerVsAiTimeout); playerVsAiTimeout = null; }
        aiRequestInFlight = true;
        updateStatus();
        const gen = aiGeneration;
        playerVsAiTimeout = setTimeout(async () => {
          if (gen !== aiGeneration) return;  // stopAllAi() appelé entre-temps
          if (!state || !isAiTurn()) { aiRequestInFlight = false; updateStatus(); return; }
          try {
            const data = await api('/api/ai_move', 'POST');
            if (gen !== aiGeneration) return;  // réponse périmée
            if (!data.ok) { messageEl.textContent = data.error || "Erreur IA"; return; }
            if (!state?.jeu_en_cours) return;
            state = data.state;
            aiRequestInFlight = false;
            renderAll();
          } finally { if (gen === aiGeneration) aiRequestInFlight = false; }
        }, 600);
      }
    }

    function setupIaLoop() {
      if (iaTimer) { clearInterval(iaTimer); iaTimer = null; }
      if (state?.mode === 3) {
        iaTimer = setInterval(async () => {
          if (iaPaused || aiRequestInFlight || !state?.jeu_en_cours) {
            if (!state?.jeu_en_cours) { clearInterval(iaTimer); iaTimer = null; iaPaused = true; updatePauseBtn(); }
            return;
          }
          aiRequestInFlight = true;
          const gen = aiGeneration;
          try {
            const data = await api('/api/ai_step', 'POST');
            if (gen !== aiGeneration) return;  // réponse périmée, on ignore
            if (data.ok && state?.jeu_en_cours) { state = data.state; renderAll(); }
          } finally { if (gen === aiGeneration) aiRequestInFlight = false; }
        }, 600);
      }
      updatePauseBtn();
    }

    function updatePauseBtn() {
      const btn = document.getElementById('btnPause');
      const isIaVsIa = state?.mode === 3;
      btn.style.display = isIaVsIa ? 'inline-block' : 'none';
      btn.textContent = iaPaused ? '▶ Reprendre' : '⏸ Pause';
      btn.style.background = iaPaused ? '#27ae60' : '#2980b9';
    }

    function stopAllAi() {
      if (iaTimer) { clearInterval(iaTimer); iaTimer = null; }
      if (playerVsAiTimeout) { clearTimeout(playerVsAiTimeout); playerVsAiTimeout = null; }
      aiRequestInFlight = false;
      aiGeneration++;
    }

    // ═══════════════════════════════════════════════════
    //  DÉMARRER / RESTAURER PARTIE
    // ═══════════════════════════════════════════════════
    async function startGame() {
      stopAllAi();
      iaPaused = false;
      const mode        = selMode;
      const humanJeton  = (mode === 2 || mode === 4) ? selHuman : 1;
      const jetonInit   = selCommence;
      const depth       = selDepth;

      const data = await api('/api/new_game', 'POST', {
        mode,
        human_jeton: humanJeton,
        jeton_initial: jetonInit,
      });
      if (!data.ok) { alert(data.error || 'Erreur création partie'); return; }
      if (data.gid) saveGameId(data.gid);
      state = data.state;

      if (mode !== 1) {
        const depthData = await api('/api/set_depth', 'POST', { depth });
        if (depthData.ok) state = depthData.state;
      }

      renderAll();
      setupIaLoop();
      scheduleAiIfNeeded();
      modeChangeNote.textContent = '';
    }

    async function restoreGameIfAny() {
      if (!gameId) { drawBoard(); return; }
      const data = await api('/api/state');
      if (!data.ok || !data.state) { drawBoard(); return; }
      state = data.state;
      renderAll();
      if (data.state.jeu_en_cours) {
        setupIaLoop();
        scheduleAiIfNeeded();
      }
    }

    // ═══════════════════════════════════════════════════
    //  CLIC SUR LE CANVAS
    // ═══════════════════════════════════════════════════
    gameCanvas.addEventListener('click', async (event) => {
      if (!state || !state.jeu_en_cours) return;
      if (state.mode === 3) return;
      if (isAiTurn()) return;

      const rect = gameCanvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      if (y < 30 || y > NB_LIGNES * TAILLE_CASE + 30) return;

      const col = Math.floor(x / TAILLE_CASE);
      const data = await api('/api/play', 'POST', { col });
      if (!data.ok) { messageEl.textContent = data.error || 'Coup invalide'; return; }
      state = data.state;
      renderAll();
      scheduleAiIfNeeded();
    });

    // ═══════════════════════════════════════════════════
    //  PANNEAU DROIT — événements
    // ═══════════════════════════════════════════════════

    // Boutons de mode
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const newMode = parseInt(btn.dataset.mode);

        if (state && state.jeu_en_cours) {
          // Changer de mode en cours de partie
          stopAllAi();
          iaPaused = false;
          const data = await api('/api/set_mode', 'POST', { mode: newMode });
          if (!data.ok) { modeChangeNote.textContent = data.error; return; }
          // Resync obligatoire : une callback setInterval peut s'être
          // exécutée après clearInterval (déjà en file JS) et avoir joué
          // un coup côté serveur → on relit l'état réel du serveur.
          const fresh = await api('/api/state');
          state = (fresh.ok && fresh.state) ? fresh.state : data.state;
          selMode = newMode;
          modeChangeNote.textContent = '✓ Mode changé';
          setTimeout(() => { modeChangeNote.textContent = ''; }, 1800);
          renderAll();
          setupIaLoop();
          scheduleAiIfNeeded();
        } else {
          selMode = newMode;
          refreshModeButtons();
          syncRightPanel();
          modeChangeNote.textContent = '';
        }
      });
    });

    // Qui commence
    document.querySelectorAll('[data-commence]').forEach(btn => {
      btn.addEventListener('click', () => {
        selCommence = parseInt(btn.dataset.commence);
        refreshCommenceButtons();
      });
    });

    // Je joue
    document.querySelectorAll('[data-human]').forEach(btn => {
      btn.addEventListener('click', () => {
        selHuman = parseInt(btn.dataset.human);
        refreshHumanButtons();
      });
    });

    // Profondeur
    depthInput.addEventListener('input', async () => {
      selDepth = parseInt(depthInput.value);
      depthValue.textContent = selDepth;
      if (state && state.jeu_en_cours) {
        const data = await api('/api/set_depth', 'POST', { depth: selDepth });
        if (data.ok) { state = data.state; }
      }
    });

    // Nouvelle partie
    document.getElementById('btnNewGame').addEventListener('click', startGame);

    // ═══════════════════════════════════════════════════
    //  BOUTONS TOOLBAR
    // ═══════════════════════════════════════════════════
    document.getElementById('btnPause').addEventListener('click', async () => {
      if (!state || !state.jeu_en_cours || state.mode !== 3) return;
      iaPaused = !iaPaused;
      if (iaPaused && aiRequestInFlight) {
        // Calcul en cours : on annule côté serveur et on rejette la réponse
        aiGeneration++;
        aiRequestInFlight = false;
        await api('/api/ia_cancel', 'POST');
        // Resync pour afficher l'état réel (coup non joué)
        const fresh = await api('/api/state');
        if (fresh.ok && fresh.state) { state = fresh.state; renderAll(); }
      }
      updatePauseBtn();
      updateStatus();
    });

    let navInFlight = false;

    async function doNav(apiUrl) {
      if (navInFlight || !state) return;
      const iaVsIaPaused = state.mode === 3 && iaPaused;
      if (!iaVsIaPaused) stopAllAi();
      navInFlight = true;
      updateStatus();
      try {
        const data = await api(apiUrl, 'POST');
        if (!data.ok) { messageEl.textContent = data.error || 'Navigation impossible'; return; }
        state = data.state;
        renderAll();
        if (!iaVsIaPaused) scheduleAiIfNeeded();
      } finally {
        navInFlight = false;
        updateStatus();
      }
    }

    document.getElementById('btnUndo').addEventListener('click', () => doNav('/api/undo'));
    document.getElementById('btnRedo').addEventListener('click', () => doNav('/api/redo'));

    document.getElementById('btnSave').addEventListener('click', async () => {
      if (!state) return;
      const saves = getSavedGames();
      const savedAt = Date.now();
      saves.push({
        id: `${savedAt}-${Math.floor(Math.random() * 100000)}`,
        name: `Partie ${saves.length + 1}`,
        savedAt,
        mode: state.mode,
        state: JSON.parse(JSON.stringify(state)),
      });
      setSavedGames(saves);
      const data = await api('/api/save', 'POST');
      if (!data.ok) { messageEl.textContent = data.error || 'Erreur sauvegarde'; return; }
      stopAllAi();
      if (state.jeu_en_cours) {
        state = null;
        renderAll();
      }
      messageEl.textContent = '✓ Partie sauvegardée.';
    });

    document.getElementById('btnAbandon').addEventListener('click', async () => {
      if (!state) return;
      if (!window.confirm('Voulez-vous vraiment abandonner la partie ?')) return;
      stopAllAi();
      const data = await api('/api/abandon', 'POST');
      if (!data.ok) { messageEl.textContent = data.error || 'Abandon impossible'; return; }
      state = data.state;
      renderAll();
    });

    document.getElementById('btnLoad').addEventListener('click', () => {
      window.location.href = '/saves';
    });


    // ═══════════════════════════════════════════════════
    //  MODE ÉDITION
    // ═══════════════════════════════════════════════════
    const editCanvas  = document.getElementById('editCanvas');
    const editCtx     = editCanvas.getContext('2d');
    const editMessage = document.getElementById('editMessage');
    const EDIT_OFFSET_Y = 20;

    let editBoard      = null;
    let editColor      = 1;
    let editAlterne    = false;
    let editAlterneNext = 1;
    let editFirstJeton = 1;
    let editSelMode    = 1;
    let editSelHuman   = 1;

    function openEditMode() {
      editBoard      = Array.from({length: NB_LIGNES}, () => Array(NB_COLONNES).fill(0));
      editColor      = 1;
      editFirstJeton = 1;
      editSelMode    = 1;
      editSelHuman   = 1;
      editMessage.textContent = '';
      refreshEditPalette();
      refreshEditFirst();
      refreshEditModeButtons();
      refreshEditHumanButtons();
      showEditView();
      drawEditBoard();
      renderEditorSaves();
    }

    function drawEditBoard() {
      editCtx.clearRect(0, 0, editCanvas.width, editCanvas.height);
      editCtx.fillStyle = 'blue';
      editCtx.fillRect(0, 0, editCanvas.width, editCanvas.height);
      editCtx.fillStyle = 'white';
      editCtx.font = 'bold 14px Arial';
      editCtx.textAlign = 'center';
      for (let c = 0; c < NB_COLONNES; c++) {
        editCtx.fillText(String(c + 1), c * TAILLE_CASE + TAILLE_CASE / 2, 15);
      }
      for (let l = 0; l < NB_LIGNES; l++) {
        for (let c = 0; c < NB_COLONNES; c++) {
          const cx = c * TAILLE_CASE + TAILLE_CASE / 2;
          const cy = l * TAILLE_CASE + EDIT_OFFSET_Y + TAILLE_CASE / 2;
          const val = editBoard[l][c];
          editCtx.beginPath();
          editCtx.arc(cx, cy, TAILLE_CASE / 2 - 5, 0, Math.PI * 2);
          editCtx.fillStyle = val === 1 ? 'red' : val === 2 ? 'yellow' : 'white';
          editCtx.fill();
          editCtx.lineWidth = 1;
          editCtx.strokeStyle = 'black';
          editCtx.stroke();
        }
      }
    }

    function refreshEditPalette() {
      document.getElementById('palErase').classList.toggle('active', !editAlterne && editColor === 0);
      document.getElementById('palRouge').classList.toggle('active', !editAlterne && editColor === 1);
      document.getElementById('palJaune').classList.toggle('active', !editAlterne && editColor === 2);
      document.getElementById('palToggle').classList.toggle('active', editAlterne);
    }

    function refreshEditFirst() {
      document.getElementById('editFirst1').classList.remove('sel-rouge', 'sel-jaune');
      document.getElementById('editFirst2').classList.remove('sel-rouge', 'sel-jaune');
      if (editFirstJeton === 1) document.getElementById('editFirst1').classList.add('sel-rouge');
      else                      document.getElementById('editFirst2').classList.add('sel-jaune');
    }

    document.getElementById('palErase').addEventListener('click', () => { editAlterne = false; editColor = 0; refreshEditPalette(); });
    document.getElementById('palRouge').addEventListener('click', () => { editAlterne = false; editColor = 1; refreshEditPalette(); });
    document.getElementById('palJaune').addEventListener('click', () => { editAlterne = false; editColor = 2; refreshEditPalette(); });
    document.getElementById('palToggle').addEventListener('click', () => { editAlterne = !editAlterne; editAlterneNext = 1; refreshEditPalette(); });
    document.getElementById('editFirst1').addEventListener('click', () => { editFirstJeton = 1; refreshEditFirst(); });
    document.getElementById('editFirst2').addEventListener('click', () => { editFirstJeton = 2; refreshEditFirst(); });

    editCanvas.addEventListener('click', (e) => {
      if (!editBoard) return;
      const rect = editCanvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top - EDIT_OFFSET_Y;
      const c = Math.floor(x / TAILLE_CASE);
      const l = Math.floor(y / TAILLE_CASE);
      if (c < 0 || c >= NB_COLONNES || l < 0 || l >= NB_LIGNES) return;
      const cur = editBoard[l][c];
      if (editAlterne) {
        editBoard[l][c] = editAlterneNext;
        editAlterneNext = editAlterneNext === 1 ? 2 : 1;
      } else if (editColor === 0) {
        editBoard[l][c] = 0;
      } else {
        editBoard[l][c] = cur === editColor ? 0 : editColor;
      }
      editMessage.textContent = '';
      drawEditBoard();
    });

    document.getElementById('btnEditBack').addEventListener('click', () => {
      showMainView();
    });

    document.getElementById('btnEditClear').addEventListener('click', () => {
      editBoard = Array.from({length: NB_LIGNES}, () => Array(NB_COLONNES).fill(0));
      editMessage.textContent = '';
      drawEditBoard();
    });

    function refreshEditModeButtons() {
      document.querySelectorAll('.edit-mode-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.editMode) === editSelMode);
      });
      const needsHuman = editSelMode === 2 || editSelMode === 4;
      document.getElementById('editJeJoueSection').style.display = needsHuman ? 'flex' : 'none';
    }

    function refreshEditHumanButtons() {
      document.getElementById('editHuman1').classList.remove('sel-rouge', 'sel-jaune');
      document.getElementById('editHuman2').classList.remove('sel-rouge', 'sel-jaune');
      if (editSelHuman === 1) document.getElementById('editHuman1').classList.add('sel-rouge');
      else                    document.getElementById('editHuman2').classList.add('sel-jaune');
    }

    async function lancerDepuisEdition(mode) {
      editMessage.textContent = '';
      const data = await api('/api/start_from_position', 'POST', {
        plateau: editBoard,
        mode,
        jeton_actuel: editFirstJeton,
        human_jeton: editSelHuman,
      });
      if (!data.ok) { editMessage.textContent = data.error || 'Position invalide'; return; }
      if (data.gid) saveGameId(data.gid);
      state = data.state;
      selMode = mode;
      selHuman = editSelHuman;
      showMainView();
      renderAll();
      setupIaLoop();
      scheduleAiIfNeeded();
    }

    document.querySelectorAll('.edit-mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        editSelMode = parseInt(btn.dataset.editMode);
        refreshEditModeButtons();
      });
    });

    document.getElementById('editHuman1').addEventListener('click', () => { editSelHuman = 1; refreshEditHumanButtons(); });
    document.getElementById('editHuman2').addEventListener('click', () => { editSelHuman = 2; refreshEditHumanButtons(); });
    document.getElementById('btnEditStart').addEventListener('click', () => lancerDepuisEdition(editSelMode));
    document.getElementById('btnEditMode').addEventListener('click',  openEditMode);

    // ── Sauvegardes éditeur ──
    const EDITOR_SAVES_KEY = 'puissance4_editor_saves';
    function getEditorSaves() {
      try { return JSON.parse(localStorage.getItem(EDITOR_SAVES_KEY)) || []; }
      catch { return []; }
    }
    function setEditorSaves(saves) { localStorage.setItem(EDITOR_SAVES_KEY, JSON.stringify(saves)); }

    function renderEditorSaves() {
      const saves = getEditorSaves();
      const el = document.getElementById('editSavesList');
      if (saves.length === 0) {
        el.innerHTML = '<div style="color:#7f8c8d;font-size:12px;text-align:center;padding:4px;">Aucune position sauvegardée</div>';
        return;
      }
      el.innerHTML = saves.map(s => `
        <div class="esave-item">
          <span>${s.name}</span>
          <div class="esave-btns">
            <button class="esave-load" onclick="chargerEditorSave('${s.id}')">Charger</button>
            <button class="esave-del"  onclick="supprimerEditorSave('${s.id}')">✕</button>
          </div>
        </div>
      `).join('');
    }

    window.chargerEditorSave = function(id) {
      const save = getEditorSaves().find(s => s.id === id);
      if (!save) return;
      editBoard = JSON.parse(JSON.stringify(save.board));
      editFirstJeton = save.firstJeton || 1;
      refreshEditFirst();
      editMessage.textContent = '';
      drawEditBoard();
    };

    window.supprimerEditorSave = function(id) {
      setEditorSaves(getEditorSaves().filter(s => s.id !== id));
      renderEditorSaves();
    };

    document.getElementById('btnEditSave').addEventListener('click', () => {
      const saves = getEditorSaves();
      const id = `${Date.now()}-${Math.floor(Math.random() * 10000)}`;
      saves.push({ id, name: `Position ${saves.length + 1}`, savedAt: Date.now(),
                   board: JSON.parse(JSON.stringify(editBoard)), firstJeton: editFirstJeton });
      setEditorSaves(saves);
      renderEditorSaves();
      editMessage.style.color = '#2ecc71';
      editMessage.textContent = '✓ Position sauvegardée !';
      setTimeout(() => { editMessage.textContent = ''; editMessage.style.color = '#e74c3c'; }, 1500);
    });

    // ═══════════════════════════════════════════════════
    //  INITIALISATION
    // ═══════════════════════════════════════════════════
    refreshCommenceButtons();
    refreshHumanButtons();
    refreshModeButtons();
    syncRightPanel();
    restoreGameIfAny();
  </script>
</body>
</html>
